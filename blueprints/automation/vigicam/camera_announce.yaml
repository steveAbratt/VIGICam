blueprint:
  name: VIGI Camera — Speak on Trigger
  description: >
    When a trigger fires, generate a TTS announcement and play it through a VIGI camera's
    speaker. The full pipeline — TTS generation, format conversion, upload, and playback —
    is handled automatically by the vigicam.speak service.


    The message supports templates so you can include dynamic data from the trigger
    (e.g. sensor values, entity states, trigger details).


    **Requirements:**

    - A configured TTS engine (e.g. Nabu Casa Cloud TTS, Piper local TTS).

    - HA 2024.6+ (for tts.get_tts_audio response support).

    - VIGICam integration 0.3.9+.


    **Audio length limit:** The camera accepts a maximum of 15 seconds / 256 KB of audio.
    Keep messages to around 10 seconds or less to be safe. A typical spoken sentence is
    3–5 seconds. Messages that exceed the limit will fail silently (check the HA log for
    details).


    **Example messages:**

    - Static: `"Motion detected at the front gate"`

    - Dynamic: `"{{ now().strftime('%-I:%M %p') }} — person detected at stables"`

  domain: automation
  input:
    trigger_config:
      name: Trigger
      description: What fires the announcement. Can be any trigger type.
      selector:
        trigger: {}
    camera_entity:
      name: Camera
      description: The VIGI camera to speak through.
      selector:
        entity:
          domain: camera
          integration: vigicam
    message:
      name: Announcement message
      description: >
        Text to speak. Supports Jinja2 templates — reference trigger data, entity states,
        or time. Keep messages to ~10 seconds or less (camera hard limit: 15 s / 256 KB).
        A typical sentence is 3–5 seconds. Longer messages will fail — check the HA log.
        Example: "Motion detected at the front gate"
      selector:
        template: {}
    tts_engine:
      name: TTS engine
      description: >
        Which TTS engine to use. Select the entity (e.g. tts.cloud for Nabu Casa,
        tts.piper for local Piper). Must be configured and working in HA.
      default: tts.cloud
      selector:
        entity:
          domain: tts
    language:
      name: Language (optional)
      description: >
        Language code for the TTS engine (e.g. en-GB, en-US, fr-FR). Leave blank
        to use the engine's default language.
      default: ""
      selector:
        text: {}
    audio_slot:
      name: Audio slot
      description: >
        Camera slot to use for TTS audio (101, 102, or 103). Slot 101 is overwritten
        each time — this is the convention for dynamic/TTS content. Use 102 or 103
        only if you need TTS and a static sound simultaneously.
      default: 101
      selector:
        number:
          min: 101
          max: 103
          step: 1
          mode: box

trigger: !input trigger_config

action:
  - service: vigicam.speak
    data:
      entity_id: !input camera_entity
      message: !input message
      tts_engine: !input tts_engine
      language: !input language
      slot: !input audio_slot
