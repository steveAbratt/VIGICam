ptz:
  name: PTZ Move
  description: >
    Start continuous camera movement in a direction. If duration is
    specified the camera stops automatically; otherwise call vigicam.ptz_stop
    to stop it.
  fields:
    entity_id:
      name: Camera entity
      description: The camera entity to move (e.g. camera.vigi_c540v_stream).
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    direction:
      name: Direction
      description: Movement direction.
      required: true
      selector:
        select:
          options:
            - left
            - right
            - up
            - down
            - zoom_in
            - zoom_out
    speed:
      name: Speed
      description: Movement speed from 0.1 (slow) to 1.0 (fast). Default 0.3.
      selector:
        number:
          min: 0.1
          max: 1.0
          step: 0.05
    duration:
      name: Duration (seconds)
      description: >
        Seconds to move before stopping automatically. If omitted the camera
        moves until vigicam.ptz_stop is called.
      selector:
        number:
          min: 0.1
          max: 30.0
          step: 0.1
          unit_of_measurement: s

ptz_stop:
  name: PTZ Stop
  description: Stop all camera movement immediately.
  fields:
    entity_id:
      name: Camera entity
      description: The camera entity to stop.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam

goto_preset:
  name: Go to Preset
  description: Move a PTZ camera to a named preset position.
  fields:
    entity_id:
      name: Camera entity
      description: The camera entity to move.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    preset:
      name: Preset name
      description: >
        Name of the preset to move to, exactly as it appears in the
        PTZ Preset select entity (e.g. "Full Stable Yard").
      required: true
      selector:
        text:

speak:
  name: Speak
  description: >
    Generate a TTS announcement and play it through the camera speaker in one step.
    Handles the full pipeline: TTS generation → convert to camera-compatible WAV
    (8 kHz mono via ffmpeg) → upload to slot → play.
    Requires HA 2024.6+ for tts.get_tts_audio response support.
  fields:
    entity_id:
      name: Camera entity
      description: The camera to speak through.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    message:
      name: Message
      description: >
        Text to speak. Supports Jinja2 templates. Keep under ~10 seconds of speech —
        the camera's hard limit is 15 seconds / 256 KB. A typical sentence is 3–5 seconds.
        Messages that exceed the limit will fail (check the HA log for details).
      required: true
      example: "Motion detected at the front gate"
      selector:
        text: {}
    tts_engine:
      name: TTS engine
      description: TTS entity to use (e.g. tts.cloud, tts.piper). Default tts.cloud.
      selector:
        entity:
          domain: tts
    language:
      name: Language (optional)
      description: Language code (e.g. en-GB). Defaults to engine default.
      selector:
        text: {}
    slot:
      name: Audio slot
      description: Custom slot to upload to (101, 102, or 103). Default 101.
      selector:
        number:
          min: 101
          max: 103
          step: 1
    times:
      name: Times
      description: How many times to play the message. Default 1.
      selector:
        number:
          min: 1
          max: 50
          step: 1
    pause:
      name: Pause between plays (seconds)
      description: Seconds to wait between each repetition. Default 1.0.
      selector:
        number:
          min: 0.5
          max: 30.0
          step: 0.5
          unit_of_measurement: s

play_file:
  name: Play File
  description: >
    Fetch an audio file, convert it to the camera's required format (8 kHz mono 16-bit
    WAV via ffmpeg), upload to a slot, and play it through the camera speaker.
    Accepts any audio format ffmpeg supports (WAV, MP3, OGG, etc.).
    The camera hard limit is 15 seconds / 256 KB — files longer than this will fail.
  fields:
    entity_id:
      name: Camera entity
      description: The camera to play the file on.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    url:
      name: Audio URL or path
      description: >
        URL of the audio file (e.g. http://192.168.1.x:8123/local/alert.wav for a file
        in /config/www/) or an absolute file path on the HA host (e.g. /config/media/alert.wav).
        Files must be ≤15 seconds when converted to 8 kHz mono — roughly 256 KB.
      required: true
      selector:
        text:
    slot:
      name: Audio slot
      description: Camera slot to use (101, 102, or 103). Default 101.
      default: 101
      selector:
        number:
          min: 101
          max: 103
          step: 1
          mode: box
    times:
      name: Times
      description: How many times to play the audio. Default 1.
      selector:
        number:
          min: 1
          max: 50
          step: 1
    pause:
      name: Pause between plays (seconds)
      description: Seconds to wait between each repetition. Default 1.0.
      selector:
        number:
          min: 0.5
          max: 30.0
          step: 0.5
          unit_of_measurement: s

upload_audio:
  name: Upload Audio
  description: >
    Upload an audio file to a custom slot on the camera. The camera plays it through
    its speaker when the slot is triggered. Use play: true to play immediately after upload.
    Supported formats: WAV mono 8 kHz ≤15 s ≤256 KB; MP3 mono ≤15 s ≤128 KB ≤64 kbps.
    Typical use: generate TTS audio, upload to camera, play back on-site.
  fields:
    entity_id:
      name: Camera entity
      description: The camera to upload audio to.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    url:
      name: Audio URL
      description: >
        URL of the audio file to upload. Can be any URL accessible from Home Assistant,
        including HA TTS proxy URLs (e.g. http://homeassistant.local:8123/api/tts_proxy/...).
      required: true
      selector:
        text:
    slot:
      name: Slot
      description: Custom audio slot on the camera (101, 102, or 103). Default 101.
      selector:
        number:
          min: 101
          max: 103
          step: 1
    name:
      name: Audio name
      description: Name stored on the camera for this audio file. Default "custom".
      selector:
        text:
    play:
      name: Play after upload
      description: Play the audio through the camera speaker immediately after uploading.
      selector:
        boolean:

play_audio:
  name: Play Audio
  description: >
    Play an audio slot through the camera's speaker. Upload audio first with
    vigicam.upload_audio. Built-in slots: 0 = Alarm Tone, 1 = Ring Tone.
    Custom slots: 101, 102, 103 (must be uploaded first).
    Note: this plays once per call (test/preview behaviour). For security alarm
    looping, use the Alarm Trigger button entity — loop count is set by the
    Alarm Sound Repetitions number entity.
  fields:
    entity_id:
      name: Camera entity
      description: The camera to play audio on.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    slot:
      name: Slot
      description: Audio slot to play. Custom slots 101–103 or built-in 0/1.
      selector:
        number:
          min: 0
          max: 103
          step: 1
    times:
      name: Times
      description: How many times to play the audio. Default 1.
      selector:
        number:
          min: 1
          max: 50
          step: 1
    pause:
      name: Pause between plays (seconds)
      description: Seconds to wait between each repetition. Default 1.0.
      selector:
        number:
          min: 0.5
          max: 30.0
          step: 0.5
          unit_of_measurement: s

delete_audio:
  name: Delete Audio
  description: >
    Delete a custom audio slot from the camera (101, 102, or 103).
    Safe to call on an already-empty slot. Use this to free a slot before
    uploading new content, or to clear a slot no longer in use.
  fields:
    entity_id:
      name: Camera entity
      description: The camera to delete audio from.
      required: true
      selector:
        entity:
          domain: camera
          integration: vigicam
    slot:
      name: Slot
      description: Custom slot to delete (101, 102, or 103).
      required: true
      selector:
        number:
          min: 101
          max: 103
          step: 1
